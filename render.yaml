services:
  - type: web
    name: ai-ddr-backend
    runtime: python
    startCommand: uvicorn api:app --host 0.0.0.0 --port 8000
    buildCommand: pip install -r requirements.txt
    plan: free  # Change to starter/standard for production
    region: us-west  # Change as needed
    
    # Environment variables
    envVars:
      - key: GEMINI_API_KEY
        scope: run
        sync: false
        value: your_gemini_api_key_here
      
      - key: FRONTEND_URL
        scope: run
        sync: false
        value: https://your-frontend.vercel.app
      
      - key: ENVIRONMENT
        scope: run
        sync: false
        value: production
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Health check
    healthCheck:
      path: /health
      interval: 30
      timeout: 5
      startFailureThreshold: 10
      startSuccessThreshold: 1

# You can add frontend service here too if deploying from same repo
# - type: web
#   name: ai-ddr-frontend
#   runtime: node
#   ...
